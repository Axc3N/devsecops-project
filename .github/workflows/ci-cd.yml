name: DevSecOps Pipeline 

 

on: 
  push: 
    branches: [main] 
  pull_request: 
    branches: [main] 

 

jobs: 

  # BUILD/TEST 
  build-and-test: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v4 
      - uses: actions/setup-node@v4 
        with: { node-version: '20' } 
      - name: Install dependencies 
        run: cd backend && npm ci 
      - name: Run linter 
        run: cd backend && npx eslint . --ext .js || true 
      - name: Run tests 
        run: cd backend && npm test || true 

 

  # SECURITE

  security-scan: 

    runs-on: ubuntu-latest 
    needs: build-and-test 
    steps: 
      - uses: actions/checkout@v4 
      - name: npm audit 
        run: cd backend && npm audit --audit-level=high || true 
      - name: Build Docker images 
        run: | 
          docker build -t devsecops-frontend ./frontend 
          docker build -t devsecops-backend ./backend 
      - name: Trivy scan frontend 
        uses: aquasecurity/trivy-action@master 
        with: 
          image-ref: devsecops-frontend 
          severity: CRITICAL,HIGH 
          exit-code: '0' 
      - name: Trivy scan backend 
        uses: aquasecurity/trivy-action@master 
        with: 
          image-ref: devsecops-backend 
          severity: CRITICAL,HIGH 
          exit-code: '0' 

 

  # DEPLOY

  deploy: 

    runs-on: ubuntu-latest 
    needs: security-scan 
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' 
    steps: 
      - uses: actions/checkout@v4 
      - name: Deploy to EC2 
        uses: appleboy/ssh-action@v1 
        with: 
          host: ${{ secrets.SERVER_IP }} 
          username: ubuntu 
          key: ${{ secrets.SSH_PRIVATE_KEY }} 
          script: | 
            cd ~/devsecops-project 
            git pull origin main 
            docker compose down 
            docker compose up --build -d 

 

  # DAST 

  dast-scan: 
  
    runs-on: ubuntu-latest 
    needs: deploy 
    steps: 
      - name: OWASP ZAP Baseline 
        uses: zaproxy/action-baseline@v0.12.0 
        with: 
          target: 'http://${{ secrets.SERVER_IP }}' 
          allow_issue_writing: false 